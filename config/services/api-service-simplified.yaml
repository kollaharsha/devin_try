name: api-service-simplified
environments: ["dev", "qa", "uat", "prod"]
domainName: api.example.com
contextPath: /api/v1
protocol: HTTP
port: 8080
containerImage: my-account.dkr.ecr.us-east-1.amazonaws.com/api-service:latest

environmentVariables:
  API_VERSION: v1
  SERVICE_NAME: api-service

scaling:
  minCapacity: 3
  maxCapacity: 20
  targetCpuUtilization: 60

healthCheck:
  path: /health
  interval: 30
  timeout: 5
  retries: 3
  gracePeriod: 60

security:
  mTLS: true

deployment:
  type: blue-green
  terminationWaitTime: 300

sidecarContainers:
  - name: "api-cache"
    image: "redis:alpine"
    essential: false
    cpu: 128
    memory: 256
    portMappings:
      - containerPort: 6379
        protocol: "TCP"
