name: dev-only-service
environments: ["dev"]  # Only deploy to dev environment
protocol: HTTP
port: 3000
containerImage: my-account.dkr.ecr.us-east-1.amazonaws.com/dev-tools:latest
taskSize:
  cpu: 256
  memory: 512
scaling:
  minCapacity: 1
  maxCapacity: 2
  targetCpuUtilization: 80
environmentVariables:
  NODE_ENV: development
  DEBUG: "true"
  LOG_LEVEL: debug
healthCheck:
  path: /health
  interval: 30
  timeout: 5
  retries: 3
  gracePeriod: 60
deployment:
  type: rolling
