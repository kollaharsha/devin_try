name: prod
primaryRegion: us-east-1
secondaryRegion: us-east-2
multiRegion: true
vpcCidr: "10.3.0.0/16"
availabilityZones:
  - us-east-1a
  - us-east-1b
  - us-east-1c
certificateArn: "arn:aws:acm:us-east-1:123456789012:certificate/87654321-4321-4321-4321-210987654321"
hostedZoneId: "Z1D633PJN98FT9"
domainName: "example.com"

defaults:
  environmentVariables:
    NODE_ENV: "production"
    LOG_LEVEL: "info"
    ENVIRONMENT: "prod"
    AWS_REGION: "us-east-1"
  
  sidecarContainers:
    - name: "logging-agent"
      image: "fluent/fluent-bit:latest"
      essential: false
      cpu: 64
      memory: 128
      environmentVariables:
        LOG_LEVEL: "info"
        OUTPUT_PLUGIN: "cloudwatch"
    
    - name: "metrics-collector"
      image: "prom/node-exporter:latest"
      essential: false
      cpu: 32
      memory: 64
      portMappings:
        - containerPort: 9100
          protocol: "TCP"
  
  taskSize:
    cpu: 512
    memory: 1024
  
  scaling:
    minCapacity: 2
    maxCapacity: 10
    targetCpuUtilization: 70

regions:
  us-east-1:
    environmentVariables:
      AWS_REGION: "us-east-1"
      DATABASE_URL: "postgresql://user:pass@db-east-1.example.com:5432/proddb"
      REDIS_URL: "redis://redis-east-1.example.com:6379"
    certificateArn: "arn:aws:acm:us-east-1:123456789012:certificate/87654321-4321-4321-4321-210987654321"
    
  us-east-2:
    environmentVariables:
      AWS_REGION: "us-east-2"
      DATABASE_URL: "postgresql://user:pass@db-east-2.example.com:5432/proddb"
      REDIS_URL: "redis://redis-east-2.example.com:6379"
    certificateArn: "arn:aws:acm:us-east-2:123456789012:certificate/12345678-1234-1234-1234-123456789012"
    sidecarContainers:
      - name: "backup-agent"
        image: "backup/agent:latest"
        essential: false
        cpu: 128
        memory: 256
        environmentVariables:
          BACKUP_REGION: "us-east-2"
          BACKUP_SCHEDULE: "0 2 * * *"
